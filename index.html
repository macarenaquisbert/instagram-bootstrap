<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Instagram Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--CSS -->
<link rel="stylesheet" href="/start-bootstrap-template/css/style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- link de Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light">
    <div class="container">

        <h4>
            <i class="fa-brands fa-instagram"></i> Instagram</h4>

        <div class="d-flex gap-2">

            <!-- Botón verde -->
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#nuevoPostModal">
                Create a new post
            </button>

            <!--  ajustes -->
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-gear-fill"></i>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Accessibility</a></li>
                    <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- BOTONES CAMBIO DE VISTA -->
<ul class="nav nav-pills justify-content-center my-3" role="tablist">

    <li class="nav-item">
        <button class="nav-link active"
                data-bs-toggle="pill"
                data-bs-target="#vistaGrid"
                type="button">
            <i class="bi bi-grid-3x3"></i>
        </button>
    </li>

    <li class="nav-item">
        <button class="nav-link"
                data-bs-toggle="pill"
                data-bs-target="#vistaPost"
                type="button">
            <i class="bi bi-square"></i>
        </button>
    </li>

</ul>

<!-- CONTENIDO -->
<div class="tab-content">

    <!-- VISTA GRUPAL -->
    <div class="tab-pane fade show active" id="vistaGrid">

        <div class="container">
            <div class="row g-2">

                <div class="col-4"><img src="https://picsum.photos/500?1" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?2" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?3" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?4" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?5" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?6" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?7" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?8" class="img-fluid"></div>
                <div class="col-4"><img src="https://picsum.photos/500?9" class="img-fluid"></div>

            </div>
        </div>

    </div>

    <!-- VISTA INDIVIDUAL -->
    <div class="tab-pane fade" id="vistaPost">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">

                    <!-- POST 1 -->
                    <div class="card mb-4">
                        <div class="card-body d-flex justify-content-between">
                            <h5>My Crazy Dog</h5>
                            <span>08/26</span>
                        </div>
                        <img src="https://picsum.photos/500?10" class="card-img-top">
                        <div class="card-body">
                            <p><strong>204 Likes</strong></p>
                            <p>Descripción del post.</p>
                        </div>
                    </div>

                    <!-- POST 2 -->
                    <div class="card mb-4">
                        <div class="card-body d-flex justify-content-between">
                            <h5>Another Dog</h5>
                            <span>08/27</span>
                        </div>
                        <img src="https://picsum.photos/500?11" class="card-img-top">
                        <div class="card-body">
                            <p><strong>150 Likes</strong></p>
                            <p>Otra descripción.</p>
                        </div>
                    </div>

                    <!-- POST 3 -->
                    <div class="card mb-4">
                        <div class="card-body d-flex justify-content-between">
                            <h5>Dog Playing</h5>
                            <span>08/28</span>
                        </div>
                        <img src="https://picsum.photos/500?12" class="card-img-top">
                        <div class="card-body">
                            <p><strong>310 Likes</strong></p>
                            <p>Más contenido.</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="nuevoPostModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-body"> 
                <label class="form-label">Caption:</label>
                <textarea class="form-control" placeholder="Add the caption of your post here"></textarea>

                <!-- ICONOS -->
                <div class="mt-2">
                    <button class="btn btn-light border btn-sm"><i class="fa-solid fa-camera"></i></button>
                <button class="btn btn-light border btn-sm"><i class="bi bi-geo-alt-fill"></i></button>
                </div>
            </div>


            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success">Publish</button>
                
            </div>
            
            
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
